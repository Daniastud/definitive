<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Restaurante</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url("assets/ristorante.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            background-blend-mode: darken;
        }
    </style>
</head>
<body>
    <a href="index.html" class="btn home-btn">🏠 Inicio</a>

    <audio autoplay loop><source src="assets/ioviendo.mp3" type="audio/mpeg"></audio>

    <div class="contenedor-escena">
        <h1>Un refugio... o eso creías</h1>
        <img src="assets/desprecio.jpg" class="escena-img">
        <p>
            Intentas entrar a comer algo en un restaurante y parar de mojarte un poco, pero una empleada te detiene y te dice: 
            "Ay disculpa, no puedes entrar... Estás muy mojado y te ves muy calle como para comer aquí".
        </p>
        <a href="elegante.html" class="btn">Darse la vuelta con estilo</a>
    </div>
</body>
</html>
